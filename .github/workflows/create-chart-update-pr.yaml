name: "Create chart update Pull Request"

on:
  workflow_dispatch:
    inputs:
      app-version:
        description: app version (e.g. 0.1.0)
        type: string
      chart-version:
        description: chart version (e.g. 0.1.0)
        type: string

permissions:
  contents: write

jobs:
  create-chart-update-pr:
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    steps:
      - name: "Validate input"
        env:
          APP_VERSION: ${{ inputs.app-version }}
          CHART_VERSION: ${{ inputs.chart-version }}
        run: |
          # The exit code will be 1 if the pattern is not found by grep.
          echo "$APP_VERSION" | grep -E "^[0-9]+.[0-9]+.[0-9]+$"
          echo "$CHART_VERSION" | grep -E "^[0-9]+.[0-9]+.[0-9]+$"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Configure Git
        run: |
          # ref. https://github.com/orgs/community/discussions/26560#discussioncomment-3252340
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: "Create a branch"
        env:
          CHART_VERSION: ${{ inputs.chart-version }}
        run: |
            git switch main
            git pull
            git switch -c "bump-chart-$CHART_VERSION"
      - name: "Update files"
        env:
          APP_VERSION: ${{ inputs.app-version }}
          CHART_VERSION: ${{ inputs.chart-version }}
        run: |
          sed -r -i 's/version: [[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+/version: '"$CHART_VERSION"'/g' charts/pie/Chart.yaml
          sed -r -i 's/appVersion: [[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+/appVersion: '"$APP_VERSION"'/g' charts/pie/Chart.yaml
          sed -r -i 's/ghcr.io\/topolvm\/pie:[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+/ghcr.io\/topolvm\/pie:'"$APP_VERSION"'/g' charts/pie/Chart.yaml
      - name: Issue an access token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.PROJECT_APP_ID }}
          private-key: ${{ secrets.PROJECT_APP_PEM }}
          permission-pull-requests: write
      - name: "Create pull request"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CHART_VERSION: ${{ inputs.chart-version }}
        run: |
          gh auth setup-git
          git commit -a -s -m "Bump chart version to $CHART_VERSION"
          git push --set-upstream origin "bump-chart-$CHART_VERSION"
          gh pr create --draft --fill
