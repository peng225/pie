name: "Create chart update Pull Request"

on:
  workflow_dispatch:
    inputs:
      app-version:
        description: app version (e.g. 0.1.0)
        type: string
      chart-version:
        description: chart version (e.g. 0.1.0)
        type: string

permissions:
  contents: write

jobs:
  create-chart-update-pr:
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: "Validate input"
        env:
          APP_VERSION: ${{ inputs.app-version }}
          CHART_VERSION: ${{ inputs.chart-version }}
        run: |
          # The exit code will be 1 if the pattern is not found by grep.
          echo "$APP_VERSION" | grep -E "^[0-9]+.[0-9]+.[0-9]+$"
          echo "$CHART_VERSION" | grep -E "^[0-9]+.[0-9]+.[0-9]+$"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Configure Git
        run: |
          # ref. https://github.com/orgs/community/discussions/26560#discussioncomment-3252340
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: "Create a branch"
        env:
          CHART_VERSION: ${{ inputs.chart-version }}
        run: |
            git switch main
            git pull
            git switch -c "bump-chart-$CHART_VERSION"
      - name: "Resolve image digest"
        id: image
        env:
          APP_VERSION: ${{ inputs.app-version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          digest=$(gh api --paginate "/orgs/topolvm/packages/container/pie/versions" \
            --jq "[.[] | select(.metadata.container.tags[]? == \"$APP_VERSION\") | .name] | first")
          if [ -z "$digest" ] || [ "$digest" = "null" ]; then
            echo "::error::Could not find a digest for tag $APP_VERSION in ghcr.io/topolvm/pie" >&2
            exit 1
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
      - name: "Update files"
        env:
          APP_VERSION: ${{ inputs.app-version }}
          CHART_VERSION: ${{ inputs.chart-version }}
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
        run: |
          sed -r -i 's/version: [[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+/version: '"$CHART_VERSION"'/g' charts/pie/Chart.yaml
          sed -r -i 's/appVersion: [[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+/appVersion: '"$APP_VERSION"'/g' charts/pie/Chart.yaml
          sed -r -i 's/ghcr.io\/topolvm\/pie:[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+/ghcr.io\/topolvm\/pie:'"$APP_VERSION"'/g' charts/pie/Chart.yaml
          sed -r -i "s|^(  reference:).*|\1 $APP_VERSION@$IMAGE_DIGEST|" charts/pie/values.yaml
      - name: "Create pull request"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHART_VERSION: ${{ inputs.chart-version }}
        run: |
          git commit -a -s -m "Bump chart version to $CHART_VERSION"
          git push --set-upstream origin "bump-chart-$CHART_VERSION"
          gh pr create --draft --fill
